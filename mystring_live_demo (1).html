<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyString — Custom C++ String Class</title>
<style>
  * { box-sizing: border-box; }
  body {
    background: #f4f3f1;
    color: #2b2b2b;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 60px 20px;
    text-align: center;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 {
    color: #6b3410;
    font-size: 48px;
    font-weight: 800;
    margin: 0 0 16px;
  }
  .subtitle {
    color: #666;
    font-size: 18px;
    margin-bottom: 40px;
  }
  label.field-label {
    display: block;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #222;
  }
  select, input[type=text], input[type=number] {
    width: 100%;
    max-width: 620px;
    background: #fff;
    border: none;
    border-radius: 30px;
    padding: 16px 24px;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 14px;
    text-align: center;
  }
  .row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .row select, .row input { width: 220px; margin-bottom: 0; }
  button.run {
    background: #6b3410;
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  button.run:hover { background: #55290c; }
  .state {
    margin-top: 28px;
    font-size: 15px;
    color: #888;
  }
  .suggestions-label {
    font-size: 22px;
    font-weight: 700;
    margin: 40px 0 16px;
    color: #222;
  }
  .output {
    text-align: left;
    max-width: 620px;
    margin: 0 auto;
    min-height: 60px;
  }
  .output div {
    background: #fff;
    border-radius: 12px;
    padding: 12px 18px;
    margin-bottom: 8px;
    font-size: 15px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .ok { color: #2e7d32; }
  .err { color: #c62828; }
  .warn { color: #b8860b; }
  .info { color: #555; }
</style>
</head>
<body>
<div class="wrap">
  <h1>MyString</h1>
  <div class="subtitle">Core logic written in C++, run here in JavaScript for easy live demoing</div>

  <label class="field-label">Choose an operation:</label>
  <select id="opSelect" onchange="selectMenu(this.value)">
    <option value="1">Create / overwrite a string</option>
    <option value="2">Display both slots</option>
    <option value="3">Get length of A and B</option>
    <option value="4">Concatenate (A + B)</option>
    <option value="5">Compare A and B</option>
    <option value="6">Access character by index</option>
    <option value="7">Get substring</option>
    <option value="8">Find substring / character</option>
    <option value="9">Copy A into B (deep copy)</option>
    <option value="0">Reset session</option>
  </select>

  <div class="row" id="form"></div>
  <button class="run" onclick="runSelected()">Run</button>

  <div class="state" id="state"></div>

  <div class="suggestions-label">Output:</div>
  <div class="output" id="log"></div>
</div>

<script>
const formSpecs = {
  '1': [{n:'slot', t:'slot'}, {n:'text', t:'text', p:'Enter the string'}],
  '6': [{n:'slot', t:'slot'}, {n:'index', t:'number', p:'Index'}],
  '7': [{n:'slot', t:'slot'}, {n:'start', t:'number', p:'Start index'}, {n:'count', t:'number', p:'Count (blank = to end)'}],
  '8': [{n:'slot', t:'slot'}, {n:'text', t:'text', p:'Text to find'}]
};

let bufCounter = 1;
let A = {str:'', buf:0};
let B = {str:'', buf:0};
let log = [];

function push(text, cls) { log.push({text, cls}); }

function renderState() {
  document.getElementById('state').textContent =
    'A = "' + A.str + '"  [buf #' + A.buf + ']     B = "' + B.str + '"  [buf #' + B.buf + ']';
}

function slotSelectHtml(name) {
  return '<select id="field-' + name + '"><option value="A">Slot A</option><option value="B">Slot B</option></select>';
}

function selectMenu(k) {
  const formDiv = document.getElementById('form');
  const spec = formSpecs[k];
  formDiv.innerHTML = '';
  if (!spec) return;
  spec.forEach(f => {
    if (f.t === 'slot') formDiv.innerHTML += slotSelectHtml(f.n);
    else if (f.t === 'number') formDiv.innerHTML += '<input id="field-' + f.n + '" type="number" placeholder="' + f.p + '">';
    else formDiv.innerHTML += '<input id="field-' + f.n + '" type="text" placeholder="' + f.p + '">';
  });
}

function getSlot(name) { return name === 'B' ? B : A; }
function setSlot(name, obj) { if (name === 'B') B = obj; else A = obj; }

function runSelected() {
  const k = document.getElementById('opSelect').value;
  const spec = formSpecs[k];
  const params = {};
  if (spec) spec.forEach(f => { params[f.n] = document.getElementById('field-' + f.n).value; });
  execute(k, params);
}

function execute(k, p) {
  try {
    switch (k) {
      case '1': {
        const slot = p.slot || 'A';
        setSlot(slot, {str: p.text || '', buf: ++bufCounter});
        push('Slot ' + slot + ' set to "' + (p.text || '') + '" (new buffer #' + bufCounter + ')', 'ok');
        break;
      }
      case '2':
        push('A = "' + A.str + '"', 'info');
        push('B = "' + B.str + '"', 'info');
        break;
      case '3':
        push('Length of A: ' + A.str.length, 'info');
        push('Length of B: ' + B.str.length, 'info');
        break;
      case '4':
        push('A + B = "' + A.str + B.str + '"', 'ok');
        break;
      case '5':
        if (A.str === B.str) push('A and B are equal.', 'ok');
        else push('A comes ' + (A.str < B.str ? 'before' : 'after') + ' B (lexicographically).', 'warn');
        break;
      case '6': {
        const slot = getSlot(p.slot || 'A');
        const idx = parseInt(p.index, 10);
        if (isNaN(idx) || idx < 0 || idx >= slot.str.length) push('Error: index out of range', 'err');
        else push("Character at index " + idx + " = '" + slot.str[idx] + "'", 'ok');
        break;
      }
      case '7': {
        const slot = getSlot(p.slot || 'A');
        const start = parseInt(p.start, 10);
        const countRaw = p.count;
        if (isNaN(start) || start > slot.str.length || start < 0) push('Error: start out of range', 'err');
        else {
          const count = countRaw === '' || countRaw === undefined ? NaN : parseInt(countRaw, 10);
          const n = isNaN(count) || start + count > slot.str.length ? slot.str.length - start : count;
          push('Substring = "' + slot.str.substr(start, n) + '"', 'ok');
        }
        break;
      }
      case '8': {
        const slot = getSlot(p.slot || 'A');
        const pos = slot.str.indexOf(p.text || '');
        if (pos === -1) push('Not found.', 'err');
        else push('Found at index ' + pos, 'ok');
        break;
      }
      case '9':
        B = {str: A.str, buf: ++bufCounter};
        push('Copied A into B. B is now "' + B.str + '" (buf #' + B.buf + ', separate from A\'s buf #' + A.buf + ')', 'ok');
        break;
      case '0':
        A = {str:'', buf:0}; B = {str:'', buf:0}; bufCounter = 1;
        log = [];
        push('Session reset.', 'warn');
        break;
    }
  } catch (e) {
    push('Error: ' + e.message, 'err');
  }
  renderState();
  renderLog();
}

function renderLog() {
  const logDiv = document.getElementById('log');
  logDiv.innerHTML = log.slice(-6).map(l => '<div class="' + l.cls + '">' + l.text.replace(/</g,'&lt;') + '</div>').join('');
}

selectMenu('1');
renderState();
renderLog();
</script>
</body>
</html>
